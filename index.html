<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBase</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
*::-webkit-scrollbar{display:none}

body{background:#f5f2ed;color:#1c1917;font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}
:root{
  --bg:#f5f2ed;--card:#ffffff;--card2:#faf8f5;--border:#e2ddd7;--border2:#d4cec7;
  --text:#1c1917;--muted:#78716c;--muted2:#a8a29e;--shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
}
.wrap{max-width:1060px;margin:0 auto;padding:0 24px}

.hdr-outer{background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:stretch}
.accent-bar{width:4px;flex-shrink:0}
.hdr-main{flex:1;display:flex;flex-direction:column;min-width:0}
.hdr-top{display:flex;align-items:center;padding:0 20px;height:44px;gap:10px}
.logo-block{display:flex;align-items:center;gap:9px;padding-right:14px;border-right:1px solid var(--border);flex-shrink:0}
.logo-icon2{width:24px;height:24px;background:var(--text);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.logo-text2{font-size:13px;font-weight:700;color:var(--text);font-family:'Lora',serif;letter-spacing:-.2px;white-space:nowrap}
.logo-sub-txt{font-size:9px;color:var(--muted2);letter-spacing:.5px;display:block;line-height:1;margin-top:1px}
.hdr-date-pill{font-size:11px;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap}
.hdr-ghost{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 7px;font-size:12px;color:var(--text);cursor:pointer;transition:all .12s}
.hdr-ghost:hover{background:var(--card2);border-color:var(--muted2)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:28px 0}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 20px;box-shadow:var(--shadow)}
.stat-num{font-family:'Lora',serif;font-size:30px;font-weight:700;line-height:1;margin-bottom:4px;color:var(--text)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:500}

/* SUBJECTS */
.sec-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.subjects-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.subj-card{display:block;text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px 20px;position:relative;overflow:hidden;transition:all .15s;box-shadow:var(--shadow)}
.subj-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.subj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.subj-emoji{font-size:22px;margin-bottom:10px}
.subj-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.subj-meta{font-size:11px;color:var(--muted)}
.subj-count{position:absolute;top:16px;right:16px;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff}

.side-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.feed-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.feed-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.feed-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.feed-sub{font-size:11px;color:var(--muted)}

.cal-section{margin-top:20px}
.cal-card{background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.cal-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--text)}
.cal-nav{display:flex;gap:6px}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:6px;min-width:28px;height:28px;padding:0 8px;cursor:pointer;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.cal-nav-btn:hover{background:var(--card2);border-color:var(--border2);color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;padding:10px 4px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2);font-weight:600;border-bottom:1px solid var(--border)}
.cal-day{min-height:72px;padding:6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.cal-day:hover{background:var(--card2)}
.cal-day.today .cal-day-num{background:var(--text);color:var(--card);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}

.subject-view{display:none;flex-direction:column;min-height:calc(100vh - 120px)}
.subject-view.active{display:flex}
.main-content{display:grid;grid-template-columns:280px 1fr 320px;gap:20px;flex:1}

body.dark{
  --bg:#141210;--card:#1e1c19;--card2:#252220;--border:#302d29;--border2:#3d3935;
  --text:#e8e3dc;--muted:#9e9890;--muted2:#6b6560;
  background:#141210 !important; color:#e8e3dc;
}
body.dark .hdr-outer, body.dark .stat-card, body.dark .subj-card, 
body.dark .side-card, body.dark .cal-card {background:var(--card)!important; border-color:var(--border)!important;}
</style>
</head>
<body>

<div class="hdr-outer">
  <div class="accent-bar" style="background:#f59e0b"></div>
  <div class="hdr-main">
    <div class="hdr-top">
      <div class="logo-block">
        <div class="logo-icon2">🎓</div>
        <div>
          <div class="logo-text2">StudyBase</div>
          <span class="logo-sub-txt">SCHOOL REFERENCE</span>
        </div>
      </div>
      <div id="branch-badge" style="font-size:11px;color:#15803d;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap;">
        <strong>main</strong> • v2.0.0-UP
      </div>
      <div class="hdr-right-row" style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <span class="hdr-date-pill">Today — <strong id="todayDate"></strong></span>
        <button class="hdr-ghost" id="darkToggle">🌙</button>
      </div>
    </div>
  </div>
</div>

<div class="wrap" style="margin-top:28px">
  <div class="stats-row" id="statsRow"></div>

  <div id="dashboard">
    <div class="sec-title">Subjects</div>
    <div class="subjects-grid" id="subjectsGrid"></div>

    <div class="cal-section">
      <div class="cal-card">
        <div class="cal-header">
          <div class="cal-title" id="calMonthLabel">May 2026</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="cal-nav">
              <button class="cal-nav-btn" onclick="calPrev()">‹</button>
              <button class="cal-nav-btn" onclick="calToday()">Today</button>
              <button class="cal-nav-btn" onclick="calNext()">›</button>
            </div>
            <button class="cal-nav-btn" style="background:var(--text);color:var(--bg);border:none">+ Add</button>
          </div>
        </div>
        <div class="cal-grid" id="calDow"></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>
  </div>

  <div id="subjectView" class="subject-view">
    <div class="main-content">
      <div class="sidebar-subject side-card" style="margin:0">
        <button onclick="backToDashboard()" style="margin-bottom:12px">← Back to Hub</button>
        <h2 id="subjectTitle" style="font-family:'Lora',serif;font-size:22px;margin-bottom:16px"></h2>
        <div id="subjectSidebarContent"></div>
      </div>
      <div class="detail-area" id="detailArea" style="background:#f5f2ed;padding:30px">
        <div style="text-align:center;padding:100px 20px;color:var(--muted)">
          <h3>Select a topic from the left sidebar</h3>
        </div>
      </div>
      <div></div>
    </div>
  </div>
</div>

<script src="subjects.js"></script>
<script>
// ==================== MAIN SCRIPT ====================
let subjects = [];
let currentSubject = null;

function init() {
  if (typeof subjectsData === "undefined") {
    document.getElementById('subjectsGrid').innerHTML = `<p style="color:red;padding:20px;">subjects.js not found</p>`;
    return;
  }
  subjects = subjectsData.subjects || [];
  renderSubjects();
  updateStats();
  checkUrlHash();
  renderCalendar();
}

function renderSubjects() {
  const grid = document.getElementById('subjectsGrid');
  grid.innerHTML = subjects.map(s => `
    <a href="#" onclick="openSubject('${s.id}'); return false" class="subj-card" style="border-color:${s.colour}33">
      <div class="subj-emoji">${s.emoji || '📚'}</div>
      <div class="subj-count" style="background:${s.colour}" id="cnt-${s.id}">0</div>
      <div class="subj-name">${s.name}</div>
      <div class="subj-meta" id="meta-${s.id}">No topics yet</div>
      <!-- Dynamic colored top line -->
      <div style="position:absolute;top:0;left:0;right:0;height:4px;background:${s.colour};"></div>
    </a>
  `).join('');
}

function openSubject(id) {
  const subject = subjects.find(s => s.id === id);
  if (!subject) return;

  currentSubject = subject;
  window.location.hash = id;

  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('subjectView').classList.add('active');
  document.getElementById('subjectTitle').textContent = subject.name;
  document.getElementById('subjectTitle').style.color = subject.colour;

  document.getElementById('subjectSidebarContent').innerHTML = `
    <p><strong>ID:</strong> ${subject.id}</p>
    <p><strong>Colour:</strong> ${subject.colour}</p>
    <hr style="margin:15px 0">
    <button onclick="alert('Full units & topics coming soon')">+ Add Unit</button>
  `;
}

function checkUrlHash() {
  const hash = window.location.hash.slice(1);
  if (hash) {
    const subject = subjects.find(s => s.id === hash);
    if (subject) openSubject(hash);
  }
}

function backToDashboard() {
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('subjectView').classList.remove('active');
  window.location.hash = '';
}

function updateStats() {
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${subjects.length*8 || 47}</div><div class="stat-label">Total Topics</div></div>
    <div class="stat-card accent-eco"><div class="stat-num">28</div><div class="stat-label">Total Units</div></div>
    <div class="stat-card"><div class="stat-num">${subjects.length}</div><div class="stat-label">Subjects</div></div>
    <div class="stat-card accent-eng"><div class="stat-num">May 22</div><div class="stat-label">Last Added</div></div>
  `;
}

function renderCalendar() {
  const dows = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  document.getElementById('calDow').innerHTML = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');
  let html = '';
  for(let i=1; i<=35; i++){
    const today = i===24;
    html += `<div class="cal-day${today?' today':''}"><div class="cal-day-num">${i}</div></div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

function calPrev(){alert("Previous month");}
function calNext(){alert("Next month");}
function calToday(){alert("Today");}

// Dark Mode
document.getElementById('darkToggle').onclick = () => {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('studybase_dark', isDark ? '1' : '0');
  document.getElementById('darkToggle').textContent = isDark ? '☀️' : '🌙';
};

// Init
document.addEventListener('DOMContentLoaded', () => {
  init();
  document.getElementById('todayDate').textContent = 
    new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
});
</script>
</body>
</html>
