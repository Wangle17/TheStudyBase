<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering — Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* Hide scrollbars globally but keep scrolling */
*{scrollbar-width:none;-ms-overflow-style:none}
*::-webkit-scrollbar{display:none}

html,body{height:100%;overflow:hidden}
body{background:#f5f2ed;color:#1c1917;font-family:'Inter',sans-serif;display:flex;flex-direction:column;font-size:14px}
:root{
  --card:#fff;--card2:#faf8f5;--border:#e2ddd7;--border2:#d4cec7;
  --text:#1c1917;--muted:#78716c;--muted2:#a8a29e;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --accent:#0f4c81;--ac-l:rgba(15,76,129,.07);--ac-b:rgba(15,76,129,.2);
}
.topbar{height:52px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;flex-shrink:0;box-shadow:var(--shadow)}
.back-link{display:flex;align-items:center;gap:5px;color:var(--muted);text-decoration:none;font-size:12px;font-weight:500;padding-right:16px;border-right:1px solid var(--border);margin-right:16px;transition:color .15s}
.back-link:hover{color:var(--accent)}
.subj-info{display:flex;align-items:center;gap:10px}
.subj-stripe{width:3px;height:22px;background:var(--accent);border-radius:2px;flex-shrink:0}
.subj-name{font-family:'Lora',serif;font-size:16px;font-weight:600}
.subj-label{font-size:11px;color:var(--muted)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.stat-chip{font-size:12px;color:var(--muted)}
.stat-chip strong{color:var(--text);font-weight:600}
.btn-new{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s}
.btn-new:hover{opacity:.88}
.btn-new:active{transform:scale(.97)}
.app-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:268px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:12px;border-bottom:1px solid var(--border)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:13px;pointer-events:none}
.search-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:8px 10px 8px 30px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s,background .15s}
.search-input:focus{border-color:var(--accent);background:#fff}
.search-input::placeholder{color:var(--muted2)}
.unit-wrap{padding:10px 12px 8px;border-bottom:1px solid var(--border)}
.unit-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2);font-weight:600;margin-bottom:6px}
.unit-pills{display:flex;flex-wrap:wrap;gap:4px}
.unit-pill{padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
.unit-pill.active{background:var(--ac-l);border-color:var(--ac-b);color:var(--accent);font-weight:600}
.unit-pill:hover:not(.active){background:var(--card2);border-color:var(--border2)}
.unit-del{opacity:0;font-size:11px;transition:opacity .12s;color:var(--muted2)}
.unit-pill:hover .unit-del{opacity:.7}
.unit-del:hover{opacity:1!important;color:#dc2626}
.topic-list{flex:1;overflow-y:auto}
.topic-list::-webkit-scrollbar{width:4px}
.topic-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.topic-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);border-left:3px solid transparent;transition:background .12s,border-color .12s}
.topic-item:hover{background:var(--card2)}
.topic-item.active{background:var(--ac-l);border-left-color:var(--accent)}
.ti-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-unit{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.ti-prev{font-size:11px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-empty{padding:32px 16px;text-align:center;color:var(--muted2);font-size:13px;line-height:1.6}
.detail-panel{flex:1;overflow-y:auto;background:#f5f2ed;padding:28px 36px}
.detail-panel::-webkit-scrollbar{width:5px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:10px;opacity:.45}
.welcome-icon{font-size:40px;margin-bottom:4px}
.welcome h2{font-family:'Lora',serif;font-size:20px;font-weight:400}
.welcome p{font-size:13px;color:var(--muted);max-width:260px;line-height:1.6}
.detail-content{display:none;max-width:720px}
.detail-content.on{display:block !important;animation:up .2s ease}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.dh{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.dh-name{font-family:'Lora',serif;font-size:26px;font-weight:700;line-height:1.15;margin-bottom:8px}
.dh-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dh-unit{display:inline-block;background:var(--ac-l);border:1px solid var(--ac-b);border-radius:4px;padding:2px 9px;font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
.dh-date{font-size:11px;color:var(--muted2)}
.dh-actions{display:flex;gap:6px;flex-shrink:0}
.btn-act{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s}
.btn-act:hover{border-color:var(--border2);color:var(--text);background:var(--card2)}
.btn-act.danger:hover{border-color:#fca5a5;color:#dc2626;background:#fef2f2}
.section{background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.section-header{padding:10px 16px;background:var(--card2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;font-size:11px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:600}
.sh-icon{font-size:13px}
.section-body{padding:16px}
.def-text{font-family:'Lora',serif;font-size:15px;line-height:1.8;color:var(--text);font-style:italic}
.key-points{list-style:none;display:flex;flex-direction:column;gap:7px}
.kp-item{display:flex;gap:9px;align-items:flex-start;font-size:13px;line-height:1.55;color:var(--text)}
.kp-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:6px}
.formula-box{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:13px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);white-space:pre-wrap;line-height:1.65}
.plain-text{font-size:13px;line-height:1.65;color:var(--muted)}
.exam-tip{background:#fefce8;border:1px solid #fde68a;border-radius:6px;padding:12px 14px;font-size:13px;line-height:1.6;color:#713f12}
.exam-tip::before{content:'💡  '}
.warning-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;padding:12px 14px;font-size:13px;line-height:1.6;color:#7c2d12}
.warning-box::before{content:'⚠  '}
.related-tags{display:flex;flex-wrap:wrap;gap:6px}
.rtag{background:var(--card2);border:1px solid var(--border);border-radius:4px;padding:3px 10px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .12s}
.rtag:hover{border-color:var(--ac-b);color:var(--accent);background:var(--ac-l)}
.empty-note{font-size:12px;color:var(--muted2);font-style:italic}
.overlay{position:fixed;inset:0;background:rgba(28,25,23,.45);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:32px 20px;overflow-y:auto;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:#fff;border:1px solid var(--border);border-radius:12px;width:100%;max-width:640px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.12);flex-shrink:0;animation:pop .2s cubic-bezier(.34,1.4,.64,1)}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(-8px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Lora',serif;font-size:19px;font-weight:600}
.modal-x{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.modal-x:hover{color:var(--text);border-color:var(--border2)}
.form-g{margin-bottom:14px}
.form-l{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;margin-bottom:6px}
.form-l span{text-transform:none;letter-spacing:0;font-weight:400;font-size:11px}
.form-i,.form-ta,.form-sel{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s,background .15s}
.form-i:focus,.form-ta:focus,.form-sel:focus{border-color:var(--accent);background:#fff}
.form-i::placeholder,.form-ta::placeholder{color:var(--muted2)}
.form-ta{resize:vertical;line-height:1.6}
.form-mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.form-sel option{background:#fff}
.form-row{display:flex;gap:10px}
.form-row .form-g{flex:1}
.unit-row{display:flex;gap:7px}
.kp-list{display:flex;flex-direction:column;gap:5px;margin-bottom:7px}
.kp-row{display:flex;gap:7px;align-items:center}
.kp-row input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s,background .15s}
.kp-row input:focus{border-color:var(--accent);background:#fff}
.kp-row input::placeholder{color:var(--muted2)}
.btn-kp-del{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:15px;padding:3px 5px;border-radius:4px;transition:color .12s,background .12s}
.btn-kp-del:hover{color:#dc2626;background:#fef2f2}
.btn-add-kp{background:var(--card2);border:1px dashed var(--border2);color:var(--muted);border-radius:6px;padding:6px 12px;font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .12s;width:100%;text-align:left}
.btn-add-kp:hover{background:var(--ac-l);border-color:var(--ac-b);color:var(--accent)}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:7px 9px;cursor:text;transition:border-color .15s;min-height:38px;align-items:center}
.tags-wrap:focus-within{border-color:var(--accent);background:#fff}
.tag-chip{background:var(--ac-l);border:1px solid var(--ac-b);border-radius:4px;padding:2px 7px 2px 8px;font-size:11px;color:var(--accent);display:flex;align-items:center;gap:4px}
.tag-chip button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;line-height:1;padding:0;opacity:.55;transition:opacity .12s}
.tag-chip button:hover{opacity:1}
.tags-i{background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;flex:1;min-width:80px}
.tags-i::placeholder{color:var(--muted2)}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-cancel{padding:8px 16px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:all .12s}
.btn-cancel:hover{color:var(--text);border-color:var(--border2);background:var(--card2)}
.btn-save{padding:8px 20px;border-radius:7px;border:none;background:var(--accent);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .12s}
.btn-save:hover{opacity:.88}
.btn-small{padding:7px 11px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .12s}
.btn-small:hover{border-color:var(--border2);color:var(--text)}
#unitInputRow{display:none;margin-top:6px}
.confirm-overlay{position:fixed;inset:0;background:rgba(28,25,23,.5);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.confirm-overlay.open{display:flex}
.confirm-box{background:#fff;border:1px solid #fca5a5;border-radius:10px;padding:24px;max-width:360px;text-align:center;animation:pop .18s ease;box-shadow:0 20px 50px rgba(0,0,0,.1)}
.confirm-box h3{font-family:'Lora',serif;font-size:17px;margin-bottom:6px}
.confirm-box p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.confirm-btns{display:flex;gap:8px;justify-content:center}
.btn-del-conf{padding:8px 18px;border-radius:7px;border:1px solid #fca5a5;background:#fef2f2;color:#dc2626;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .12s}
.btn-del-conf:hover{background:#fee2e2}
@media(max-width:680px){.sidebar{width:100%;max-height:200px}.app-body{flex-direction:column}.detail-panel{padding:16px}}

.sync-chip{font-size:11px;color:var(--muted2);transition:color .3s;margin-left:4px}
.sync-chip.ok{color:#15803d}
.sync-chip.err{color:#dc2626}
.sync-chip.warn{color:#d97706}

/* ── Rich editor ── */
.rich-editor-wrap{position:relative}
.rich-toolbar{display:flex;align-items:center;gap:5px;padding:5px 8px;background:var(--card2);border:1px solid var(--border);border-bottom:none;border-radius:7px 7px 0 0}
.rich-toolbar-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;flex:1;user-select:none}
.rich-btn{background:#fff;border:1px solid var(--border);border-radius:4px;padding:3px 9px;font-size:11px;cursor:pointer;color:var(--muted);transition:all .12s;font-family:'Inter',sans-serif;line-height:1.5;white-space:nowrap}
.rich-btn:hover{background:var(--ac-l);border-color:var(--ac-b);color:var(--accent)}
.rich-content{min-height:52px;background:var(--card2);border:1px solid var(--border);border-radius:0 0 7px 7px;padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s,background .15s;line-height:1.6;overflow-y:auto;cursor:text;word-break:break-word}
.rich-content:focus{border-color:var(--accent);background:#fff}
.rich-content:empty::before{content:attr(data-placeholder);color:var(--muted2);pointer-events:none;white-space:pre}
.rich-content.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.rich-content img{max-width:100%;height:auto;border-radius:4px;margin:4px 0;display:block;cursor:default}
.rich-editor-wrap.drag-over .rich-content{border-color:var(--accent) !important;background:var(--ac-l) !important;border-style:dashed !important}
.formula-box img,.plain-text img,.warning-box img,.exam-tip img,.def-text img{max-width:100%;height:auto;border-radius:4px;display:block;margin:6px 0}


/* ── Dark mode ── */
body.dark{
  --card:#1e1c19;--card2:#252220;
  --border:#302d29;--border2:#3d3935;
  --text:#e8e3dc;--muted:#9e9890;--muted2:#6b6560;
  --ac-l:rgba(var(--accent-rgb),.1);
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  background:#141210 !important;
  color:#e8e3dc;
}
body.dark .topbar,body.dark header{background:#1e1c19 !important}
body.dark .sidebar{background:#1e1c19 !important}
body.dark .detail-panel{background:#141210 !important}

body.dark .topbar{background:var(--card) !important}
body.dark .sidebar{background:var(--card) !important}
body.dark .detail-panel{background:#141210 !important}
body.dark .section{background:var(--card) !important}
body.dark .section-header{background:var(--card2) !important}
body.dark .btn-act{background:var(--card2) !important}
body.dark .rich-btn{background:var(--card2) !important}
body.dark .modal{background:var(--card) !important;box-shadow:0 20px 60px rgba(0,0,0,.5) !important}
body.dark .confirm-box{background:var(--card) !important;box-shadow:0 20px 60px rgba(0,0,0,.5) !important}
body.dark .search-input:focus{background:var(--card) !important}
body.dark .rich-content:focus,.form-i:focus,.form-ta:focus{background:var(--card2) !important}
body.dark .form-sel option{background:var(--card)}
body.dark .plain-text{color:#c4bdb4 !important}
body.dark .exam-tip{background:#1c1a08 !important;border-color:#3d3410 !important;color:#e8d96e !important}
body.dark .warning-box{background:#1f1208 !important;border-color:#4d2c10 !important;color:#f0b07a !important}

body.dark .topic-item:hover{background:var(--card2) !important}
body.dark .unit-pill:hover:not(.active){background:var(--card2) !important;border-color:var(--border2) !important}
body.dark img:not(.no-invert){filter:invert(0.88) hue-rotate(180deg) brightness(1.15)}

.sync-countdown{font-size:10px;color:var(--muted2);margin-left:4px;font-variant-numeric:tabular-nums}

/* ── New hybrid header ── */
.hdr-outer{background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:stretch;transition:background .2s,border-color .2s;flex-shrink:0}
.accent-bar{width:4px;flex-shrink:0}
.hdr-main{flex:1;display:flex;flex-direction:column;min-width:0}
.hdr-top{display:flex;align-items:center;padding:0 20px;height:44px;gap:10px}
.logo-block{display:flex;align-items:center;gap:9px;padding-right:14px;border-right:1px solid var(--border);flex-shrink:0}
.logo-icon2{width:24px;height:24px;background:var(--text);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:background .2s}
.logo-text2{font-size:13px;font-weight:700;color:var(--text);font-family:'Lora',Georgia,serif;letter-spacing:-.2px;white-space:nowrap;transition:color .2s}
.logo-sub-txt{font-size:9px;color:var(--muted2);letter-spacing:.5px;display:block;line-height:1;margin-top:1px}
.hdr-breadcrumb{display:flex;align-items:center;gap:6px}
.bc-link{font-size:12px;color:var(--muted2);cursor:pointer;transition:color .12s;text-decoration:none}
.bc-link:hover{color:var(--muted)}
.bc-sep{font-size:11px;color:var(--muted2)}
.bc-current{font-size:12px;font-weight:600;color:var(--text);transition:color .2s}
.hdr-right-row{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}
.hdr-date-pill{font-size:11px;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap;transition:background .2s,border-color .2s,color .2s}
/* ── Tooltips ── */
.hdr-ghost{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 7px;font-size:12px;color:var(--text);cursor:pointer;transition:background .12s,border-color .12s,color .2s;line-height:1;display:flex;align-items:center;justify-content:center;font-family:inherit;position:relative}
.hdr-ghost:hover{background:var(--card2);border-color:var(--muted2)}
.hdr-ghost::after{content:attr(data-tip);position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);font-size:10px;font-weight:600;white-space:nowrap;padding:4px 9px;border-radius:5px;border:2px solid var(--border2);pointer-events:none;opacity:0;transition:opacity .12s;letter-spacing:.2px;font-family:'Inter',sans-serif;box-shadow:0 2px 6px rgba(0,0,0,0.08);z-index:50}
.hdr-ghost::before{content:'';position:absolute;top:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:var(--border2);pointer-events:none;opacity:0;transition:opacity .12s;z-index:50}
.hdr-ghost:hover::after,.hdr-ghost:hover::before{opacity:1}

.hdr-action{background:var(--text);color:var(--card);border:none;border-radius:5px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s,color .2s,opacity .12s;font-family:inherit}
.hdr-action:hover{opacity:.82}

/* ── Toasts ── */
#toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border2);border-radius:8px;padding:10px 14px;font-size:12px;font-family:'Inter',sans-serif;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,0.1);pointer-events:all;min-width:220px;max-width:320px;animation:toast-in .2s ease;transition:opacity .3s,transform .3s}
.toast.out{opacity:0;transform:translateX(20px)}
.toast-icon{font-size:15px;flex-shrink:0;line-height:1}
.toast-msg{flex:1;line-height:1.4}
.toast-close{background:none;border:none;cursor:pointer;color:var(--muted2);font-size:14px;padding:0;line-height:1;flex-shrink:0}
.toast-close:hover{color:var(--text)}
.toast.success{border-color:#86efac}
.toast.error{border-color:#fca5a5}
.toast.info{border-color:var(--border2)}
.toast.warning{border-color:#fcd34d}
body.dark .toast{box-shadow:0 4px 16px rgba(0,0,0,0.4)}
@keyframes toast-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
</style>

<script>

// ── Toast system ──
(function(){
  const container = document.createElement('div');
  container.id = 'toast-container';
  document.body.appendChild(container);

  window.showToast = function(msg, type='info', duration=3000) {
    const icons = {success:'✓', error:'✕', info:'ℹ', warning:'⚠'};
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ'}</span><span class="toast-msg">${msg}</span><button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
    container.appendChild(t);
    setTimeout(() => {
      t.classList.add('out');
      setTimeout(() => t.remove(), 350);
    }, duration);
  };
})();

// ── Dark mode ──
(function(){const on=localStorage.getItem('studybase_dark')==='1';if(on)document.body.classList.add('dark');const btn=document.getElementById('darkToggle');if(btn)btn.textContent=on?'☀️':'🌙';})();
function toggleDark(){
  const on=document.body.classList.toggle('dark');
  localStorage.setItem('studybase_dark',on?'1':'0');
  const btn=document.getElementById('darkToggle');
  if(btn)btn.textContent=on?'☀️':'🌙';
}

const ST='eng2_topics', SU='eng2_units';
const DEF=["Mechanisms", "Materials", "Structures", "Electronics", "Manufacturing"];
const getTopics=()=>JSON.parse(localStorage.getItem(ST)||'[]');
const CELL_LIMIT=45000;
const saveTopics=t=>{
  localStorage.setItem(ST,JSON.stringify(t));
  const syncData=sanitizeForSync(t);
  const json=JSON.stringify(syncData);
  if(json.length>CELL_LIMIT){setSyncStatus('warn');}
  else{syncPush(ST,syncData);setSyncStatus('ok');}
};
const getUnits=()=>JSON.parse(localStorage.getItem(SU)||JSON.stringify(DEF));
const saveUnits=u=>{
  localStorage.setItem(SU,JSON.stringify(u));
  const json=JSON.stringify(u);
  if(json.length>CELL_LIMIT){setSyncStatus('warn');}
  else{syncPush(SU,u);setSyncStatus('ok');}
};
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let activeId=null,editId=null,activeUnit='all',tempTags=[],pendingAction=null;

function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let topics=getTopics();
  const filtered=topics.filter(t=>{
    const mu=activeUnit==='all'||t.unit===activeUnit;
    const mq=!q||t.name.toLowerCase().includes(q)||(t.definition||'').toLowerCase().includes(q)||(t.unit||'').toLowerCase().includes(q)||(t.relatedTerms||[]).some(r=>r.toLowerCase().includes(q));
    return mu&&mq;
  }).sort((a,b)=>a.name.localeCompare(b.name));
  const el=document.getElementById('topicList');
  el.innerHTML=filtered.length===0
    ?`<div class="sidebar-empty">${q?'No results for "'+esc(q)+'"':'No topics yet.<br>Click <strong>+ New topic</strong> to begin.'}</div>`
    :filtered.map(t=>`<div class="topic-item${t.id==activeId?' active':''}" onclick="viewTopic(${t.id})">
        <div class="ti-name">${esc(t.name)}</div>
        ${t.unit?`<div class="ti-unit">${esc(t.unit)}</div>`:''}
        ${t.definition?`<div class="ti-prev">${esc(t.definition.substring(0,55))}…</div>`:''}
      </div>`).join('');
  document.getElementById('stT').textContent=topics.length;
  document.getElementById('stU').textContent=getUnits().length;
  renderPills();
}

function renderPills(){
  const units=getUnits(),topics=getTopics(),counts={};
  topics.forEach(t=>{if(t.unit)counts[t.unit]=(counts[t.unit]||0)+1;});
  document.getElementById('unitPills').innerHTML=
    `<button class="unit-pill${activeUnit==='all'?' active':''}" onclick="setUnit('all')">All (${topics.length})</button>`+
    units.map(u=>`<button class="unit-pill${activeUnit===u?' active':''}" data-unit="${esc(u)}" onclick="setUnit(this.dataset.unit)">${esc(u)} <span style="color:var(--muted2);font-weight:400">(${counts[u]||0})</span><span class="unit-del" onclick="event.stopPropagation();confirmDeleteUnit(this.closest('[data-unit]').dataset.unit)" title="Remove">×</span></button>`).join('');
}

function setUnit(u){activeUnit=u;renderList();}

function viewTopic(id){
  activeId=id;
  const t=getTopics().find(x=>x.id==id);
  if(!t)return;
  renderList();
  document.getElementById('welcomeState').style.display='none';
  const el=document.getElementById('detailContent');
  el.classList.remove('on');
  const kpHtml=(t.keyPoints||[]).length
    ?`<ul class="key-points">${t.keyPoints.map(k=>`<li class="kp-item"><div class="kp-dot"></div><span>${esc(k)}</span></li>`).join('')}</ul>`
    :'<p class="empty-note">No key points added yet.</p>';
  const relHtml=(t.relatedTerms||[]).length
    ?`<div class="related-tags">${t.relatedTerms.map(r=>{const m=getTopics().find(x=>x.name.toLowerCase()===r.toLowerCase());return `<span class="rtag"${m?` onclick="viewTopic(${m.id})"`:''}>${esc(r)}</span>`;}).join('')}</div>`
    :'<p class="empty-note">None listed.</p>';
  const created=new Date(t.createdAt).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
  const editedStr=t.updatedAt&&t.updatedAt!==t.createdAt
    ?'<span class="dh-date">· Edited '+new Date(t.updatedAt).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})+'</span>':''
  let extraHtml='';
    if(t.formula) extraHtml+=`<div class="section"><div class="section-header"><span class="sh-icon">∑</span>Formula / Equation</div><div class="section-body"><div class="formula-box">${sanitizeRich(t.formula)}</div></div></div>`;
    if(t.materials) extraHtml+=`<div class="section"><div class="section-header"><span class="sh-icon">🔩</span>Materials / Components</div><div class="section-body"><p class="plain-text">${sanitizeRich(t.materials)}</p></div></div>`;
    if(t.process) extraHtml+=`<div class="section"><div class="section-header"><span class="sh-icon">⚙</span>Process / Method</div><div class="section-body"><div class="formula-box">${sanitizeRich(t.process)}</div></div></div>`;
    if(t.safety) extraHtml+=`<div class="section"><div class="section-header"><span class="sh-icon">🦺</span>Safety Considerations</div><div class="section-body"><div class="warning-box">${sanitizeRich(t.safety)}</div></div></div>`;
  el.innerHTML=`<div class="dh">
      <div class="dh-left">
        <div class="dh-name">${esc(t.name)}</div>
        <div class="dh-meta">${t.unit?`<span class="dh-unit">${esc(t.unit)}</span>`:''}<span class="dh-date">Added ${created}</span>${editedStr}</div>
      </div>
      <div class="dh-actions">
        <button class="btn-act" onclick="openModal(${t.id})">Edit</button>
        <button class="btn-act danger" onclick="confirmDeleteTopic(${t.id})">Delete</button>
      </div>
    </div>
    <div class="section"><div class="section-header"><span class="sh-icon">📝</span>Definition</div>
      <div class="section-body">${t.definition?`<p class="def-text">${esc(t.definition)}</p>`:'<p class="empty-note">No definition added yet.</p>'}</div></div>
    <div class="section"><div class="section-header"><span class="sh-icon">✦</span>Key Points</div>
      <div class="section-body">${kpHtml}</div></div>
    ${extraHtml}
    ${t.examTip?`<div class="section"><div class="section-header"><span class="sh-icon">⚡</span>Exam Tip</div><div class="section-body"><div class="exam-tip">${sanitizeRich(t.examTip)}</div></div></div>`:''}
    <div class="section"><div class="section-header"><span class="sh-icon">🔗</span>Related Terms</div>
      <div class="section-body">${relHtml}</div></div>`;
  el.style.display='block';void el.offsetWidth;el.classList.add('on');
}

function openModal(id){
  editId=id||null;tempTags=[];
  document.getElementById('kpList').innerHTML='';
  document.getElementById('tagsWrap').querySelectorAll('.tag-chip').forEach(e=>e.remove());
  populateSel();
  if(id){
    const t=getTopics().find(x=>x.id==id);
    document.getElementById('modalTitle').textContent='Edit topic';
    document.getElementById('fName').value=t.name||'';
    document.getElementById('fUnit').value=t.unit||'';
    document.getElementById('fDefinition').value=t.definition||'';
    setRichVal('fExamTip',t.examTip||'');
    (t.keyPoints||[]).forEach(k=>addKpRow(k));
    (t.relatedTerms||[]).forEach(addTag);

    setRichVal('fFormula',t.formula||'');
    setRichVal('fMaterials',t.materials||'');
    setRichVal('fProcess',t.process||'');
    setRichVal('fSafety',t.safety||'');
  }else{
    document.getElementById('modalTitle').textContent='New topic';
    ['fName','fDefinition'].forEach(i=>document.getElementById(i).value='');['fExamTip','fFormula','fMaterials','fProcess','fSafety'].forEach(clearRich);
    document.getElementById('fUnit').value='';
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),80);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');editId=null;}

function populateSel(){
  const units=getUnits(),sel=document.getElementById('fUnit'),cur=sel.value;
  sel.innerHTML='<option value="">— No unit —</option>'+units.map(u=>`<option value="${esc(u)}"${u===cur?' selected':''}>${esc(u)}</option>`).join('');
}
function showUnitInput(){document.getElementById('unitInputRow').style.display='block';document.getElementById('newUnitInput').value='';document.getElementById('newUnitInput').focus();document.getElementById('btnAddUnit').style.display='none';}
function hideUnitInput(){document.getElementById('unitInputRow').style.display='none';document.getElementById('btnAddUnit').style.display='';}
function confirmAddUnit(){
  const name=document.getElementById('newUnitInput').value.trim();
  if(!name)return;
  const units=getUnits();
  if(!units.includes(name)){units.push(name);saveUnits(units);}
  populateSel();document.getElementById('fUnit').value=name;hideUnitInput();renderPills();
}

function addKpRow(val){
  val=val||'';
  const list=document.getElementById('kpList');
  const uid='kpr_'+Date.now()+'_'+Math.floor(Math.random()*9999);
  const row=document.createElement('div');
  row.className='kp-row';row.id=uid;
  const inp=document.createElement('input');
  inp.type='text';inp.placeholder='Key point…';inp.value=val;
  const btn=document.createElement('button');
  btn.className='btn-kp-del';btn.textContent='✕';
  btn.onclick=()=>document.getElementById(uid).remove();
  row.appendChild(inp);row.appendChild(btn);
  list.appendChild(row);inp.focus();
}

function addTag(text){
  text=String(text).trim();
  if(!text||tempTags.includes(text))return;
  tempTags.push(text);
  const wrap=document.getElementById('tagsWrap');
  const chip=document.createElement('span');chip.className='tag-chip';
  const label=document.createTextNode(text+' ');
  const btn=document.createElement('button');
  btn.textContent='✕';
  const captured=text;
  btn.onclick=()=>removeTag(btn,captured);
  chip.appendChild(label);chip.appendChild(btn);
  wrap.insertBefore(chip,document.getElementById('tagsInput'));
}
function removeTag(btn,text){tempTags=tempTags.filter(t=>t!==text);btn.closest('.tag-chip').remove();}

document.getElementById('tagsInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===','){e.preventDefault();const v=e.target.value.replace(',','').trim();if(v){addTag(v);e.target.value='';}}
  if(e.key==='Backspace'&&!e.target.value&&tempTags.length){const chips=document.getElementById('tagsWrap').querySelectorAll('.tag-chip');removeTag(chips[chips.length-1].querySelector('button'),tempTags[tempTags.length-1]);}
});

function saveTopic(){
  const name=document.getElementById('fName').value.trim();
  if(!name){document.getElementById('fName').focus();return;}
  const keyPoints=Array.from(document.getElementById('kpList').querySelectorAll('.kp-row input')).map(i=>i.value.trim()).filter(Boolean);
  const relatedTerms=[...tempTags];
  const ti=document.getElementById('tagsInput').value.trim();if(ti)relatedTerms.push(ti);
  const ex=editId?(getTopics().find(t=>t.id===editId)||{}):{};
  const topic={id:editId||Date.now(),name,unit:document.getElementById('fUnit').value,definition:document.getElementById('fDefinition').value.trim(),keyPoints,examTip:getRichVal('fExamTip'),relatedTerms,
    formula: getRichVal('fFormula'),
    materials: getRichVal('fMaterials'),
    process: getRichVal('fProcess'),
    safety: getRichVal('fSafety'),
    createdAt:ex.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};
  let topics=getTopics();
  topics=editId?topics.map(t=>t.id===editId?topic:t):[...topics,topic];
  saveTopics(topics);closeModal();renderList();viewTopic(topic.id);showToast(editId?'Topic updated ✎':'Topic created','success');
}

function confirmDeleteTopic(id){

  pendingAction={type:'topic',id};
  document.getElementById('cTitle').textContent='Delete this topic?';
  document.getElementById('cMsg').textContent='"'+t.name+'" will be permanently removed.';

function confirmDeleteUnit(name){

  pendingAction={type:'unit',name};

}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');pendingAction=null;}
function doDelete(){
  if(!pendingAction)return;
  if(pendingAction.type==='topic'){
    saveTopics(getTopics().filter(t=>t.id!==pendingAction.id));showToast('Topic deleted','error');
    if(activeId==pendingAction.id){activeId=null;document.getElementById('welcomeState').style.display='';document.getElementById('detailContent').classList.remove('on');}
  }else{
    saveTopics(getTopics().map(t=>t.unit===pendingAction.name?{...t,unit:''}:t));showToast('Unit removed','warning');
    saveUnits(getUnits().filter(u=>u!==pendingAction.name));
    if(activeUnit===pendingAction.name)activeUnit='all';
    populateSel();
  }
  closeConfirm();renderList();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeConfirm();}if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}});
document.getElementById('searchInput').addEventListener('input', renderList);

const SYNC_URL='https://script.google.com/macros/s/AKfycbw58Nd3KktmYnRXnW7JqKUA5vdfAwpr7Wa8GZNROv773MRWn9-3opMb9xy1XYhi_INP/exec';

function setSyncStatus(s){
  const el=document.getElementById('syncStatus');
  if(!el)return;
  if(s==='syncing'){el.textContent='↻ Syncing';el.className='sync-chip';}
  else if(s==='ok'){el.textContent='✓ Synced';el.className='sync-chip ok';}
  else if(s==='warn'){el.textContent='⚠ Too large to sync';el.className='sync-chip warn';el.title='Topic data exceeds sync limit. Remove any locally-embedded images.';}
  else{el.textContent='○ Offline';el.className='sync-chip err';}
}

// JSONP read — works from file://
function jsonpGet(url){
  return new Promise((resolve,reject)=>{
    const cb='_cb'+Date.now()+'_'+Math.floor(Math.random()*99999);
    const script=document.createElement('script');
    const cleanup=()=>{delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);};
    window[cb]=(data)=>{cleanup();resolve(data);};
    script.onerror=()=>{cleanup();reject(new Error('JSONP error'));};
    script.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    document.head.appendChild(script);
    setTimeout(()=>{cleanup();reject(new Error('Timeout'));},8000);
  });
}

// Hidden iframe form POST — works from file://
function syncPush(key,data){
  try{
    const id='sf'+Date.now();
    const iframe=document.createElement('iframe');
    iframe.name=id;iframe.style.cssText='display:none;width:0;height:0;border:0';
    const form=document.createElement('form');
    form.method='POST';form.action=SYNC_URL;form.target=id;form.style.display='none';
    [['key',key],['data',JSON.stringify(data)]].forEach(([n,v])=>{
      const inp=document.createElement('input');inp.type='hidden';inp.name=n;inp.value=v;form.appendChild(inp);
    });
    document.body.appendChild(iframe);document.body.appendChild(form);
    form.submit();
    setTimeout(()=>{
      if(iframe.parentNode)iframe.parentNode.removeChild(iframe);
      if(form.parentNode)form.parentNode.removeChild(form);
    },6000);
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
}

async function syncPull(){
  setSyncStatus('syncing');
  const PLACEHOLDER='[image — only visible on device where it was saved]';
  try{
    for(const key of [ST,SU]){
      const res=await jsonpGet(SYNC_URL+'?key='+encodeURIComponent(key));
      if(res&&res.data!==null&&res.data!==undefined){
        if(key===ST&&Array.isArray(res.data)){
          // Merge: don't let Sheets placeholder overwrite a real local image
          const local=JSON.parse(localStorage.getItem(ST)||'[]');
          const merged=res.data.map(rem=>{
            const loc=local.find(t=>t.id===rem.id);
            if(!loc)return rem;
            const m={...rem};
            Object.keys(m).forEach(k=>{
              if(typeof m[k]==='string'&&m[k].includes(PLACEHOLDER)&&
                 loc[k]&&typeof loc[k]==='string'&&!loc[k].includes(PLACEHOLDER)){
                m[k]=loc[k]; // keep local version (has real image)
              }
            });
            return m;
          });
          // Keep local-only topics not yet synced
          local.forEach(lt=>{if(!merged.find(t=>t.id===lt.id))merged.push(lt);});
          localStorage.setItem(key,JSON.stringify(merged));
        }else{
          localStorage.setItem(key,JSON.stringify(res.data));
        }
      }
    }
    setSyncStatus('ok');
    renderList();
  }catch(e){setSyncStatus('err');}
  _nextSync = Date.now() + 60000;
}

function sanitizeForSync(topics){
  return topics.map(t=>{
    const c={...t};
    Object.keys(c).forEach(k=>{
      if(typeof c[k]==='string'&&c[k].includes('data:image')){
        const d=document.createElement('div');d.innerHTML=c[k];
        d.querySelectorAll('img').forEach(img=>{
          if((img.src||'').startsWith('data:')){
            const note=document.createElement('em');
            note.textContent='[image — only visible on device where it was saved]';
            img.replaceWith(note);
          }
        });
        c[k]=d.innerHTML;
      }
    });
    return c;
  });
}
// ── Rich editor helpers ──
function getRichVal(id){const el=document.getElementById(id);if(!el)return'';return el.contentEditable==='true'?el.innerHTML.trim():el.value.trim();}
function setRichVal(id,html){const el=document.getElementById(id);if(!el)return;if(el.contentEditable==='true'){el.innerHTML=html||'';}else{el.value=html||'';}}
function clearRich(id){setRichVal(id,'');}
function sanitizeRich(html){
  if(!html)return'';
  const d=document.createElement('div');
  d.innerHTML=html;
  d.querySelectorAll('script,style,iframe,object,embed,link').forEach(e=>e.remove());
  d.querySelectorAll('img').forEach(img=>{
    const src=img.src||img.getAttribute('src')||'';
    if(!src.startsWith('data:')&&!src.startsWith('https://drive.google.com/')&&!src.startsWith('https://lh3.googleusercontent.com/'))img.remove();
  });
  return d.innerHTML;
}
function compressAndInsert(editor,file){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=900;let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const b64=cv.toDataURL('image/jpeg',0.82);

      // Insert placeholder while uploading
      const ph=document.createElement('span');
      ph.textContent='⏳ Uploading to Drive…';
      ph.style.cssText='color:var(--muted);font-size:12px;font-style:italic;display:block';
      editor.focus();
      const sel=window.getSelection();
      if(sel&&sel.rangeCount&&editor.contains(sel.getRangeAt(0).commonAncestorContainer)){
        const rng=sel.getRangeAt(0);rng.deleteContents();rng.insertNode(ph);
        rng.setStartAfter(ph);rng.collapse(true);sel.removeAllRanges();sel.addRange(rng);
      }else{editor.appendChild(ph);}

      // Upload via iframe POST (works from file://)
      const uid=Date.now()+''+Math.random().toString(36).slice(2,6);
      const uploadKey='_up_'+uid;
      const resultKey='_ur_'+uid;
      syncPush(uploadKey,{image:b64,filename:'sb_'+uid+'.jpg'});

      // Poll for the Drive URL via JSONP
      let tries=0;
      const poll=setInterval(async()=>{
        tries++;
        try{
          const res=await jsonpGet(SYNC_URL+'?key='+encodeURIComponent(resultKey));
          if(res&&res.data){
            clearInterval(poll);
            if(res.data.ok&&res.data.url){
              const imgEl=document.createElement('img');
              imgEl.src=res.data.url;
              ph.replaceWith(imgEl);
            }else{
              // Upload failed — fallback to local base64
              const imgEl=document.createElement('img');imgEl.src=b64;
              ph.replaceWith(imgEl);
            }
          }
        }catch(e){/* keep polling */}
        if(tries>=30){
          clearInterval(poll);
          // Timed out — fallback to local base64
          const imgEl=document.createElement('img');imgEl.src=b64;
          ph.replaceWith(imgEl);
        }
      },1500);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function richAddImage(id){
  const inp=document.getElementById('img_'+id);if(!inp)return;
  inp.onchange=function(){if(this.files[0]){compressAndInsert(document.getElementById(id),this.files[0]);this.value='';}};
  inp.click();
}
function setupRichDnD(){
  document.querySelectorAll('.rich-editor-wrap').forEach(wrap=>{
    const editor=wrap.querySelector('.rich-content');
    wrap.addEventListener('dragover',e=>{e.preventDefault();wrap.classList.add('drag-over');});
    wrap.addEventListener('dragleave',e=>{if(!wrap.contains(e.relatedTarget))wrap.classList.remove('drag-over');});
    wrap.addEventListener('drop',e=>{
      e.preventDefault();wrap.classList.remove('drag-over');
      const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
      if(files.length){files.forEach(f=>compressAndInsert(editor,f));return;}
    });
  });
}
