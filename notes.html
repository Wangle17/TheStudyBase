<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* === Same beautiful styles as Engineering (kept identical) === */
*{margin:0;padding:0;box-sizing:border-box}
*{scrollbar-width:none;-ms-overflow-style:none}
*::-webkit-scrollbar{display:none}
html,body{height:100%;overflow:hidden}
body{background:#f5f2ed;color:#1c1917;font-family:'Inter',sans-serif;display:flex;flex-direction:column;font-size:14px}

:root{
  --card:#fff;--card2:#faf8f5;--border:#e2ddd7;--border2:#d4cec7;
  --text:#1c1917;--muted:#78716c;--muted2:#a8a29e;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --accent:#15803d;--ac-l:rgba(21,128,61,.07);--ac-b:rgba(21,128,61,.2);
}
body.engineering { --accent:#0f4c81; --ac-l:rgba(15,76,129,.07); --ac-b:rgba(15,76,129,.2); }
body.timber { --accent:#92400e; --ac-l:rgba(146,64,14,.07); --ac-b:rgba(146,64,14,.2); }
/* Add more subjects here if needed */

.topbar{height:52px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;flex-shrink:0;box-shadow:var(--shadow)}
.back-link{display:flex;align-items:center;gap:5px;color:var(--muted);text-decoration:none;font-size:12px;font-weight:500;padding-right:16px;border-right:1px solid var(--border);margin-right:16px;transition:color .15s}
.back-link:hover{color:var(--accent)}
.subj-info{display:flex;align-items:center;gap:10px}
.subj-stripe{width:3px;height:22px;background:var(--accent);border-radius:2px;flex-shrink:0}
.subj-name{font-family:'Lora',serif;font-size:16px;font-weight:600}
.subj-label{font-size:11px;color:var(--muted)}
/* ... rest of your styles (same as before) ... */
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-link">← Hub</a>
  <div class="subj-info">
    <div class="subj-stripe"></div>
    <span class="subj-name" id="subjName">Notes</span>
    <span class="subj-label">notes</span>
  </div>
  <div class="topbar-right">
    <span class="stat-chip"><strong id="stT">0</strong> topics</span>
    <span class="stat-chip"><strong id="stU">0</strong> units</span>
    <button id="darkToggle" onclick="toggleDark()" title="Toggle dark mode" style="background:none;border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:14px;cursor:pointer">🌙</button>
    <button class="btn-new" onclick="openModal()">+ New topic</button>
  </div>
</div>

<div class="app-body">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="text" id="searchInput" placeholder="Search topics…">
      </div>
    </div>
    <div class="unit-wrap">
      <div class="unit-label">Units</div>
      <div class="unit-pills" id="unitPills"></div>
    </div>
    <div class="topic-list" id="topicList"></div>
  </div>

  <div class="detail-panel">
    <div class="welcome" id="welcomeState">
      <div class="welcome-icon" id="welcomeIcon">📊</div>
      <h2 id="welcomeTitle">Notes</h2>
      <p>Select a topic on the left, or add a new one to get started.</p>
    </div>
    <div class="detail-content" id="detailContent"></div>
  </div>
</div>

<!-- Modal and script will go here (same as before but dynamic) -->

<script>

// Apply subject-specific styles
document.body.classList.add(subjectKey === 'eng2' ? 'engineering' : subjectKey === 'tmb' ? 'timber' : '');
document.getElementById('subjName').textContent = CFG.name;
document.getElementById('welcomeIcon').textContent = CFG.icon;
document.getElementById('welcomeTitle').textContent = CFG.name + " notes";

// Storage keys
const ST = subjectKey + '_topics';
const SU = subjectKey + '_units';

const DEFAULT_UNITS = CFG.defaultUnits;

let activeId = null;

let tempTags = [];

const getTopics = () => JSON.parse(localStorage.getItem(ST) || '[]');
const getUnits = () => JSON.parse(localStorage.getItem(SU) || JSON.stringify(DEFAULT_UNITS));
const saveTopics = t => localStorage.setItem(ST, JSON.stringify(t));
const saveUnits = u => localStorage.setItem(SU, JSON.stringify(u));

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// (I'll provide the full working file if you want)

renderList();
</script>
</body>
</html>
