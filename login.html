<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBase — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f2ed;
  --card:#ffffff;
  --card2:#faf8f5;
  --border:#e2ddd7;
  --border2:#d4cec7;
  --text:#1c1917;
  --muted:#78716c;
  --muted2:#a8a29e;
  --shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px;display:flex;flex-direction:column}

/* HEADER */
header{background:var(--card);border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
.header-inner{display:flex;align-items:center;height:60px;padding:0 24px}
.wordmark{display:flex;align-items:center;gap:12px;text-decoration:none}
.wordmark-icon{width:36px;height:36px;background:#1c1917;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.wordmark h1{font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--text);line-height:1}
.wordmark span{font-size:11px;color:var(--muted);display:block;letter-spacing:.5px;margin-top:1px}

/* MAIN */
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);width:100%;max-width:380px;padding:36px}

.login-title{font-family:'Lora',serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}

.tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px}
.tab{flex:1;background:none;border:none;padding:9px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
.tab.active{background:var(--text);color:#fff}

.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;letter-spacing:.3px}
.form-i{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s}
.form-i:focus{border-color:var(--border2);background:#fff}

.btn-primary{width:100%;background:var(--text);color:#fff;border:none;border-radius:7px;padding:11px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted2);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.btn-google{width:100%;background:#fff;color:var(--text);border:1px solid var(--border);border-radius:7px;padding:10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.btn-google:hover{border-color:var(--border2);background:var(--card2)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}

.error-msg{background:#fef2f2;border:1px solid #fecaca;border-radius:7px;padding:9px 12px;font-size:13px;color:#dc2626;margin-bottom:14px;display:none}
.error-msg.show{display:block}

.success-msg{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:7px;padding:9px 12px;font-size:13px;color:#15803d;margin-bottom:14px;display:none}
.success-msg.show{display:block}

/* Dark mode */
body.dark{--bg:#141210;--card:#1e1c19;--card2:#252220;--border:#302d29;--border2:#3d3935;--text:#e8e3dc;--muted:#9e9890;--muted2:#6b6560;background:#141210}
body.dark header{background:#1e1c19}
body.dark .wordmark-icon{background:#e8e3dc}
body.dark .btn-google{background:#252220;color:#e8e3dc;border-color:#302d29}
body.dark .btn-google:hover{background:#302d29}
body.dark .tab.active{background:#e8e3dc;color:#141210}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="wordmark" href="#">
      <div class="wordmark-icon">📚</div>
      <div>
        <h1>StudyBase</h1>
        <span>YOUR STUDY HUB</span>
      </div>
    </a>
  </div>
</header>

<div class="page">
  <div class="login-card">
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to access your study notes</div>

    <div class="tabs">
      <button class="tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tabSignUp" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label>Email address</label>
      <input class="form-i" type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-i" type="password" id="passInput" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-primary" id="mainBtn" onclick="handleMain()">Sign In</button>

    <div class="divider">or</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ── Your Firebase config ──────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyAZeyBIaTstTJ5Pr9o86MHk8dhDPAJFFCA",
    authDomain: "studybase-8cfa1.firebaseapp.com",
    projectId: "studybase-8cfa1",
    storageBucket: "studybase-8cfa1.firebasestorage.app",
    messagingSenderId: "434992387793",
    appId: "1:434992387793:web:e5bcae8cad63b4eb6f17f0",
    measurementId: "G-834RTT2S7P"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // If already logged in, skip straight to the main page
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = 'index.html';
  });

  // Dark mode sync
  if (localStorage.getItem('sb_dark') === '1') document.body.classList.add('dark');

  // ── Tab state ─────────────────────────────────────────────────────────────
  let mode = 'signin';
  window.switchTab = function(tab) {
    mode = tab;
    document.getElementById('tabSignIn').classList.toggle('active', tab === 'signin');
    document.getElementById('tabSignUp').classList.toggle('active', tab === 'signup');
    document.getElementById('mainBtn').textContent = tab === 'signin' ? 'Sign In' : 'Create Account';
    document.getElementById('passInput').autocomplete = tab === 'signin' ? 'current-password' : 'new-password';
    clearMessages();
  };

  // ── Helpers ───────────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('successMsg').classList.remove('show');
  }
  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('errorMsg').classList.remove('show');
  }
  function clearMessages() {
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('successMsg').classList.remove('show');
  }
  function friendlyError(code) {
    const map = {
      'auth/invalid-email': 'That email address looks invalid.',
      'auth/user-not-found': 'No account found with that email.',
      'auth/wrong-password': 'Incorrect password — try again.',
      'auth/email-already-in-use': 'An account with that email already exists.',
      'auth/weak-password': 'Password should be at least 6 characters.',
      'auth/too-many-requests': 'Too many attempts. Try again later.',
      'auth/invalid-credential': 'Email or password is incorrect.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }
  function setLoading(on) {
    document.getElementById('mainBtn').disabled = on;
    document.getElementById('mainBtn').textContent = on
      ? 'Please wait…'
      : (mode === 'signin' ? 'Sign In' : 'Create Account');
  }

  // ── Email/password handler ────────────────────────────────────────────────
  window.handleMain = async function() {
    clearMessages();
    const email = document.getElementById('emailInput').value.trim();
    const pass  = document.getElementById('passInput').value;
    if (!email || !pass) { showError('Please fill in both fields.'); return; }
    setLoading(true);
    try {
      if (mode === 'signin') {
        await signInWithEmailAndPassword(auth, email, pass);
      } else {
        await createUserWithEmailAndPassword(auth, email, pass);
        showSuccess('Account created! Redirecting…');
      }
      // onAuthStateChanged will handle redirect
    } catch (e) {
      showError(friendlyError(e.code));
    } finally {
      setLoading(false);
    }
  };

  // ── Google handler ────────────────────────────────────────────────────────
  window.handleGoogle = async function() {
    clearMessages();
    try {
      await signInWithPopup(auth, provider);
      // onAuthStateChanged will handle redirect
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') showError(friendlyError(e.code));
    }
  };

  // Allow pressing Enter to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleMain();
  });
</script>
</body>
</html>
