<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBase — Sign In</title>
<!-- Favicon -->
<link rel="icon" href="icon.png" type="image/png">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f2ed;--card:#ffffff;--card2:#faf8f5;
  --border:#e2ddd7;--border2:#d4cec7;--text:#1c1917;
  --muted:#78716c;--muted2:#a8a29e;
  --shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px;display:flex;flex-direction:column}

header{background:var(--card);border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 24px}

.wordmark{display:flex;align-items:center;gap:12px;text-decoration:none}
.wordmark-icon{width:36px;height:36px;background:#1c1917;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.wordmark h1{font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--text);line-height:1}
.wordmark span{font-size:11px;color:var(--muted);display:block;letter-spacing:.5px;margin-top:1px}

.dark-toggle{
  background:none;border:1px solid var(--border);border-radius:6px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:all .15s;
}
.dark-toggle:hover{background:var(--card2);border-color:var(--border2)}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);width:100%;max-width:380px;padding:36px}
.login-title{font-family:'Lora',serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;letter-spacing:.3px}

/* Input Fields - Stronger Dark Mode Support */
.form-i{
  width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:7px;padding:9px 12px;font-family:'Inter',sans-serif;
  font-size:14px;color:var(--text);outline:none;transition:border-color .15s;
}
.form-i:focus{border-color:var(--border2);background:var(--card)}

/* Sign In Button */
.btn-primary{
  width:100%;background:var(--text);color:#fff;border:none;
  border-radius:7px;padding:11px;font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:4px;
}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* DARK MODE */
body.dark{
  --bg:#141210;--card:#1e1c19;--card2:#252220;--border:#302d29;
  --border2:#3d3935;--text:#e8e3dc;--muted:#9e9890;--muted2:#6b6560;
}
body.dark .wordmark-icon{background:#e8e3dc}
body.dark header{background:var(--card)}

/* Fix Inputs + Password Field in Dark Mode */
body.dark .form-i{
  background:#252220 !important;
  color:#e8e3dc !important;
  border-color:#302d29 !important;
}
body.dark .form-i:focus{
  background:#1e1c19 !important;
  border-color:#3d3935 !important;
}

/* Fix Sign In Button in Dark Mode */
body.dark .btn-primary{
  background:#e8e3dc;
  color:#1c1917;
}
body.dark .btn-primary:hover{
  opacity:0.9;
}

/* Ensure title and subtitle are visible */
body.dark .login-title,
body.dark .login-sub {
  color: var(--text) !important;
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="wordmark" href="#">
      <div class="wordmark-icon">📚</div>
      <div>
        <h1>StudyBase</h1>
        <span>YOUR STUDY HUB</span>
      </div>
    </a>
    
    <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">🌙</button>
  </div>
</header>

<div class="page">
  <div class="login-card">
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to access your study notes</div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label>Email address</label>
      <input class="form-i" type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-i" type="password" id="passInput" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-primary" id="mainBtn" onclick="handleSignIn()">Sign In</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAZeyBIaTstTJ5Pr9o86MHk8dhDPAJFFCA",
    authDomain: "studybase-8cfa1.firebaseapp.com",
    projectId: "studybase-8cfa1",
    storageBucket: "studybase-8cfa1.firebasestorage.app",
    messagingSenderId: "434992387793",
    appId: "1:434992387793:web:e5bcae8cad63b4eb6f17f0",
    measurementId: "G-834RTT2S7P"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = 'index.html';
  });

  // === DARK MODE (Consistent with index.html) ===
  const darkKey = 'studybase_dark';
  
  function applyDarkMode() {
    const isDark = localStorage.getItem(darkKey) === '1';
    document.body.classList.toggle('dark', isDark);
    const toggleBtn = document.getElementById('darkToggle');
    if (toggleBtn) toggleBtn.textContent = isDark ? '☀️' : '🌙';
  }

  // Initial load
  applyDarkMode();

  // Toggle button
  document.getElementById('darkToggle').addEventListener('click', () => {
    const isDark = document.body.classList.toggle('dark');
    localStorage.setItem(darkKey, isDark ? '1' : '0');
    document.getElementById('darkToggle').textContent = isDark ? '☀️' : '🌙';
  });

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function friendlyError(code) {
    const map = {
      'auth/invalid-email': 'That email address looks invalid.',
      'auth/user-not-found': 'No account found with that email.',
      'auth/wrong-password': 'Incorrect password — try again.',
      'auth/too-many-requests': 'Too many attempts. Try again later.',
      'auth/invalid-credential': 'Email or password is incorrect.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }

  window.handleSignIn = async function() {
    document.getElementById('errorMsg').classList.remove('show');
    const email = document.getElementById('emailInput').value.trim();
    const pass  = document.getElementById('passInput').value;
    if (!email || !pass) { showError('Please fill in both fields.'); return; }
    const btn = document.getElementById('mainBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
      showError(friendlyError(e.code));
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSignIn();
  });
</script>
</body>
</html>
