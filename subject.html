<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subject</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-5xl mx-auto p-8">
    <a href="index.html" class="text-blue-600 hover:underline mb-6 inline-block">
      ← Back to All Subjects
    </a>

    <div id="subjectHeader" class="mb-10"></div>

    <div class="bg-white rounded-3xl shadow p-8">
      <h2 class="text-2xl font-semibold mb-6">📝 Notes & Information</h2>
      <textarea id="notesArea" class="w-full h-96 p-6 border rounded-2xl focus:outline-none focus:border-blue-500 text-lg"></textarea>
      
      <button onclick="saveNotes()" 
              class="mt-6 bg-blue-600 text-white px-8 py-3 rounded-2xl hover:bg-blue-700">
        Save Notes
      </button>
    </div>
  </div>

  <script>
    // Get course number from filename (e.g. subject-375.html → 375)
    const path = window.location.pathname;
    const code = path.match(/subject-(\d+)/)?.[1];

    let subjects = JSON.parse(localStorage.getItem('subjects')) || [];
    let currentSubject = subjects.find(s => s.code === code);

    if (!currentSubject) {
      document.body.innerHTML = `<h1 class="text-center mt-20 text-2xl">Subject not found</h1>`;
    } else {
      // Fill header
      document.getElementById('subjectHeader').innerHTML = `
        <div class="flex items-center gap-6">
          <div class="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl flex items-center justify-center text-6xl">
            📖
          </div>
          <div>
            <h1 class="text-4xl font-bold">${currentSubject.name}</h1>
            <p class="text-blue-600 text-xl">Course #${currentSubject.code}</p>
            ${currentSubject.description ? `<p class="text-gray-600 mt-3">${currentSubject.description}</p>` : ''}
          </div>
        </div>
      `;

      document.getElementById('notesArea').value = currentSubject.notes || '';
    }

    function saveNotes() {
      if (!currentSubject) return;
      currentSubject.notes = document.getElementById('notesArea').value;
      localStorage.setItem('subjects', JSON.stringify(subjects));
      
      alert("✅ Notes saved successfully!");
    }
  </script>
</body>
</html>
